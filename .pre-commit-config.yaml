repos:
  # 1. Standard Git cleanliness hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  # 2. Ruff — linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # 3. Mypy — type checking via Poetry
  - repo: local
    hooks:
      - id: mypy
        name: mypy (poetry)
        entry: poetry run mypy app/
        language: system
        types: [python]
        pass_filenames: false
