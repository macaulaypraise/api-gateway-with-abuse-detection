# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: gateway_user
          POSTGRES_PASSWORD: gateway_pass
          POSTGRES_DB: gateway_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gateway_user -d gateway_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run linting
        run: poetry run ruff check .

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://gateway_user:gateway_pass@localhost:5432/gateway_test
          TEST_REDIS_URL: redis://localhost:6379/1
          SHADOW_MODE_ENABLED: "false"
          SECRET_KEY: "test-secret-key-for-ci"
        run: |
          poetry run pytest tests/unit/ tests/integration/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=85
